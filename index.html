<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏮 中國歷史文化題</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary-red: #B91C1C; --bg-paper: #FDF8F1; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--bg-paper); overflow-x: hidden; position: relative; }

        /* 背景紋理與視覺效果 (與測驗頁面完全一致) */
        .bg-pattern-overlay {
            position: fixed; inset: 0;
            background-image: url('https://www.transparenttextures.com/patterns/60-lines.png');
            opacity: 0.3; z-index: -3;
        }

        .bg-culture-visuals {
            position: fixed; inset: 0; z-index: -2; pointer-events: none;
            background-image: 
                url('https://cdn.pixabay.com/photo/2021/11/12/13/28/mountain-6789111_1280.png'),
                url('https://cdn.pixabay.com/photo/2016/09/27/09/06/cloud-1698018_1280.png');
            background-position: bottom center, top center;
            background-repeat: no-repeat, repeat-x;
            background-size: 100% auto, 300px auto;
            opacity: 0.06;
            filter: grayscale(100%);
        }

        .bg-deco-light {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-20deg) translateX(-100%);
            animation: light-drift 15s linear infinite;
            z-index: -1; pointer-events: none;
        }

        @keyframes light-drift { from { transform: skewX(-20deg) translateX(-100%); } to { transform: skewX(-20deg) translateX(200%); } }

        .chinese-font { font-family: 'Noto Serif TC', serif; }
        
        .hero-card { 
            border-top: 16px solid var(--primary-red); 
            box-shadow: 0 25px 50px -12px rgba(185, 28, 28, 0.15); 
            border-radius: 3rem;
            position: relative;
        }

        /* 按鈕立體按壓效果 */
        .btn-start {
            box-shadow: 0 8px 0 0 #991b1b;
            transition: all 0.15s ease;
        }
        .btn-start:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 0 #991b1b;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-pattern-overlay"></div>
    <div class="bg-culture-visuals"></div>
    <div class="bg-deco-light"></div>

    <div class="w-full max-w-2xl relative z-10 animate-in fade-in zoom-in duration-700">
        <div class="bg-white/95 backdrop-blur-sm hero-card p-12 md:p-20 text-center">
            
            <div class="text-8xl md:text-9xl mb-8 drop-shadow-xl animate-bounce" style="animation-duration: 3s;">🏮</div>
            
            <h1 class="text-4xl md:text-6xl font-black text-red-900 mb-6 chinese-font tracking-wide">
                中國歷史文化題
            </h1>
            
            <p class="text-xl md:text-2xl text-gray-600 mb-14 italic chinese-font">
                「探索五千年華夏文明，<br>挑戰你的歷史知識巔峰。」
            </p>

            <a href="https://kellyyyzeng.github.io/chinese-history/chinesehistory.html" 
               class="inline-block w-full md:w-auto bg-red-700 text-white px-16 py-6 rounded-2xl text-3xl font-black btn-start hover:bg-red-800 decoration-none">
                開始
            </a>
            
        </div>
    </div>

</body>
</html>
