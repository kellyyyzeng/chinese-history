<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【人文學科問答比賽】 - 總入口</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* 定義全新的色調：雅致翠綠與暖琥珀 */
        :root { 
            --primary-teal: #0F5132;    /* 深翠綠，象徵人文與學術 */
            --accent-amber: #B45309;    /* 琥珀金，與之前風格統一的點綴 */
            --bg-cream: #FFFDF9;       /* 柔和的奶油色背景 */
            --text-dark: #1F2937;
        }
        
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: var(--bg-cream); 
            overflow-x: hidden; 
            position: relative; 
            color: var(--text-dark);
        }

        /* 沿用背景紋理 */
        .bg-pattern-overlay {
            position: fixed; inset: 0;
            background-image: url('https://www.transparenttextures.com/patterns/60-lines.png');
            opacity: 0.2; z-index: -3;
        }

        /* 沿用抽象文化背景，但調整色調 */
        .bg-culture-visuals {
            position: fixed; inset: 0; z-index: -2; pointer-events: none;
            background-image: 
                url('https://cdn.pixabay.com/photo/2016/11/22/19/25/clouds-1850120_1280.jpg');
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            opacity: 0.04;
            filter: grayscale(100%) sepia(100%) hue-rotate(110deg) saturate(150%);
        }

        /* 沿用漂移光影效果 */
        .bg-deco-light {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-20deg) translateX(-100%);
            animation: light-drift 18s linear infinite;
            z-index: -1; pointer-events: none;
        }

        @keyframes light-drift { from { transform: skewX(-20deg) translateX(-100%); } to { transform: skewX(-20deg) translateX(200%); } }

        /* 沿用書法/襯線字體類 */
        .classic-font { font-family: 'Noto Serif TC', serif; }

        /* 總入口卡片容器樣式，沿用 quiz-card 架構 */
        .menu-container {
            border-top: 16px solid var(--primary-teal); 
            border-bottom: 4px solid #E5E7EB;
            box-shadow: 0 25px 50px -12px rgba(15, 81, 50, 0.15); 
            border-radius: 3rem;
            position: relative;
        }

        /* 進度條樣式的裝飾線，改為翠綠到琥珀漸層 */
        .deco-bar { background: linear-gradient(90deg, var(--primary-teal) 0%, var(--accent-amber) 100%); }

        /* 按鈕卡片樣式，沿用 option-btn 的交互邏輯 */
        .category-card {
            background: #FFFFFF; 
            border: 2px solid #E5E7EB; 
            color: #374151;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        /* 懸停效果：提升、邊框變色、陰影 */
        .category-card:not(.blank-card):hover {
            border-color: var(--primary-teal); 
            background-color: #F0FDF4; /* 淡淡的綠色背景 */
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(15, 81, 50, 0.1), 0 10px 10px -5px rgba(15, 81, 50, 0.04);
        }

        /* 空白卡片樣式：略顯淡化，無交互效果 */
        .blank-card {
            opacity: 0.6;
            background-color: #F9FAFB;
            cursor: default;
            border-style: dashed; /* 虛線邊框 */
        }

        /* 點綴小圖標 */
        .card-corner-icon {
            position: absolute;
            bottom: -15px;
            right: -10px;
            font-size: 5rem;
            opacity: 0.05;
            transform: rotate(-15deg);
        }

        /* 動態進入效果 */
        .fade-slide-up-enter-active { animation: fade-slide-up 0.6s ease-out; }
        @keyframes fade-slide-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-8">

    <div class="bg-pattern-overlay"></div>
    <div class="bg-culture-visuals"></div>
    <div class="bg-deco-light"></div>

    <div id="app" class="w-full max-w-6xl relative z-10">
        
        <transition name="fade-slide-up" appear>
            <div class="bg-white menu-container p-10 md:p-16 mb-8">
                
                <div class="mb-16 text-center">
                    <h1 class="text-5xl md:text-6xl font-black text-teal-950 classic-font tracking-tight">
                        人文學科問答比賽
                    </h1>
                    <div class="mt-6 w-32 h-1.5 deco-bar mx-auto rounded-full"></div>
                    <p class="mt-4 text-xl text-gray-600">請選擇競賽類別並點擊進入</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    
                    <a v-for="(cat, idx) in categories.slice(0, 4)" 
                       :key="cat.id" 
                       :href="cat.blank ? '#' : cat.link"
                       :class="[
                           'category-card p-8 rounded-3xl flex flex-col justify-between min-h-[220px]',
                           cat.blank ? 'blank-card' : ''
                       ]">
                        <div>
                            <div class="flex items-center gap-4 mb-4">
                                <span class="text-5xl">{{ cat.icon }}</span>
                                <h2 class="text-2xl font-bold text-gray-900 leading-tight">
                                    {{ cat.title }}
                                </h2>
                            </div>
                            <p class="text-gray-600 text-base italic">「{{ cat.description }}」</p>
                        </div>
                        <span class="card-corner-icon">{{ cat.icon }}</span>
                    </a>

                    <a :href="categories[4].blank ? '#' : categories[4].link"
                       :class="[
                           'category-card p-8 rounded-3xl flex flex-col justify-between min-h-[220px] lg:col-span-1 lg:col-start-2',
                           categories[4].blank ? 'blank-card' : ''
                       ]">
                        <div>
                            <div class="flex items-center gap-4 mb-4">
                                <span class="text-5xl">{{ categories[4].icon }}</span>
                                <h2 class="text-2xl font-bold text-gray-900 leading-tight">
                                    {{ categories[4].title }}
                                </h2>
                            </div>
                            <p class="text-gray-600 text-base italic">「{{ categories[4].description }}」</p>
                        </div>
                        <span class="card-corner-icon">{{ categories[4].icon }}</span>
                    </a>

                </div>

            </div>
        </transition>

        <div class="text-center text-teal-900/40 text-sm classic-font">
            博古通今 ∙ 學貫中西 ∙ 人文薈萃
        </div>
    </div>

    <script>
        const { createApp, ref } = Vue;

        createApp({
            setup() {
                // 定義五個類別的數據
                const categories = ref([
                    { 
                        id: 'chn', 
                        title: '中國歷史文化題目', 
                        icon: '🏮', 
                        link: 'http://kelyyyzeng.github.io/chinese-history/chinesehistory.html', // 預設連接到的文件名
                        description: '探索華夏文明的千年史詩', 
                        blank: false 
                    },
                    { 
                        id: 'west', 
                        title: '西方歷史文化題目', 
                        icon: '🏛️', 
                        link: 'http://kelyyyzeng.github.io/chinese-history/history.html', // 預設連接到的文件名
                        description: '重返歐美文明的歷史長河', 
                        blank: false 
                    },
                    // 以下三個為空白預留，blank 屬性設為 true
                    { 
                        id: 'b1', 
                        title: '—— 空白類別一 ——', 
                        icon: '📜', 
                        link: '#', 
                        description: '（稍後自行編輯文字）', 
                        blank: true 
                    },
                    { 
                        id: 'b2', 
                        title: '—— 空白類別二 ——', 
                        icon: '🖋️', 
                        link: '#', 
                        description: '（稍後自行編輯文字）', 
                        blank: true 
                    },
                    { 
                        id: 'b3', 
                        title: '—— 空白類別三 ——', 
                        icon: '🌍', 
                        link: '#', 
                        description: '（稍後自行編輯文字）', 
                        blank: true 
                    }
                ]);

                return {
                    categories
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
